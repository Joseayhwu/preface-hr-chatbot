<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preface HR Assistant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    <style>
        /* Force the HTML body to take up the full viewport and remove spacing */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Fullscreen Container for the n8n Chat Component */
        #n8n-chat {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* =======================================================================
          @n8n/chat CUSTOMIZATION INTERFACE (CSS Variables)
          Modify these variables to match the exact design guidelines of Preface.
          =======================================================================
        */
        :root {
            /* Corporate Brand Colors */
            --chat--color--primary: #e74266;            /* Primary theme/accent color (e.g., buttons, user text bubble) */
            --chat--color--primary-shade-50: #db4061;   /* Hover state for primary actions */
            --chat--color--primary--shade-100: #cf3c5c; /* Active state for primary actions */
            --chat--color--secondary: #20b69e;          /* Secondary color */
            --chat--color-secondary-shade-50: #1ca08a;

            /* Interface & Structural Neutral Colors */
            --chat--color-white: #ffffff;
            --chat--color-light: #f2f4f8;               /* Background of the bot chat bubbles and panels */
            --chat--color-light-shade-50: #e6e9f1;      /* Borders / Alternating states */
            
            /* Typography Layout Controls (If exposed by runtime overrides) */
            --chat--heading-font-size: 1.25rem;
            --chat--subtitle-font-size: 0.875rem;
        }

        /* Custom Override Tweaks for Fullscreen Compliance */
        .n8n-chat-widget-fullscreen {
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div id="n8n-chat"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            /* 1. Target Node Entry */
            target: '#n8n-chat',
            
            /* 2. Mode Configuration */
            mode: 'fullscreen', // Sets layout to track full width/height of target element container
            
            /* 3. API Hook Connection */
            // Replace with your production n8n Chat Trigger Node webhook URL
            webhookUrl: 'https://joseayhwu2.app.n8n.cloud/webhook/ce1f0081-45d9-4a41-8b47-78c354403aaa/chat', 
            
            webhookConfig: {
                method: 'POST',
                headers: {
                    // Inject any authorization or custom verification headers here if required
                    // 'Authorization': 'Bearer YOUR_TOKEN' 
                }
            },

            /* 4. Chat Engine Payload Strategy Keys */
            chatInputKey: 'chatInput',     /* Key mapped inside n8n workflow Chat Trigger parameters */
            chatSessionKey: 'sessionId',   /* Tracking parameter key passed to n8n to preserve session context */
            loadPreviousSession: true,     /* Retrieves and renders previous context messages upon browser reload */
            
            /* 5. Custom Session Payload Metadata */
            metadata: {
                department: 'Preface HR Division',
                environment: 'Production'
            },

            /* 6. Interaction Features */
            showWelcomeScreen: true,       /* Toggles initialization landing UI screen */
            enableStreaming: true,         /* If true, renders characters in real-time as agent generates them */
            
            /* 7. Document Handling Configuration */
            allowFileUploads: false,        /* Set to true if employees need to upload PDFs/Docs for HR verification */
            allowedFilesMimeTypes: 'image/*,application/pdf', /* Explicit file extension filtering rule */

            /* 8. Multilingual Strings (i18n) */
            defaultLanguage: 'en',
            i18n: {
                en: {
                    title: 'Preface HR Hub',
                    subtitle: 'Ask me anything about holiday policies, compliance, insurance, or employee handbooks.',
                    inputPlaceholder: 'Type your HR inquiry here...',
                    welcomeHeader: 'Welcome to Preface HR Support',
                    welcomeMessage: 'I am your AI Assistant powered by n8n. Let me help make your workspace navigation effortless!',
                    closeButtonTooltip: 'Close Assistant'
                }
            },

            /* 9. Initial State Layout Seeding */
            initialMessages: [
                'Hi there! 👋',
                'Welcome to the Preface HR Assistant Portal.',
                'How can I help you with our internal policies, leaves, or compensation guidelines today?'
            ]
        });
    </script>
</body>
</html>
